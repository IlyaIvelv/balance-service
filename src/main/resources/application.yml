server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/balance_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  jooq:
    sql-dialect: POSTGRES
    transaction:
      execute-with-connection: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cache:
    type: redis # Переключится на simple, если Redis недоступен

jwt:
  secret: c3VwZXItc2VjdXJlLWxvbmdfc2VjcmV0X2tleV9mb3Jfand0X3NpZ25pbmdfd2l0aF9IUzUxMl9hbGdvcml0aG1fYW5kX21pbmltdW1fNTRfY2hhcmFjdGVycw==
  expiration-ms: 3600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

logging:
  level:
    com.balanceservice: INFO
    org.springframework.security: WARN
    org.jooq: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"